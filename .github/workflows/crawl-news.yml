name: Crawl News

on:
  schedule:
    # Every 5 minutes during US market + pre/after hours (12:00-23:00 UTC)
    # GitHub Actions cron is UTC; */5 may actually run every ~10 min during high load
    - cron: '*/5 12-23 * * 1-5'
    # Every 15 minutes during overnight (for earnings reactions)
    - cron: '*/15 0-11 * * 1-5'
    # Less frequent on weekends
    - cron: '*/30 * * * 0,6'
  workflow_dispatch:   # allow manual trigger

# Only one run at a time
concurrency:
  group: crawl-news
  cancel-in-progress: false

permissions:
  contents: write      # needed to commit back to repo

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Crawl Finnhub
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/crawl_finnhub.py
        continue-on-error: true

      - name: Crawl RSS feeds
        run: python scripts/crawl_rss.py
        continue-on-error: true

      - name: Crawl Reddit
        run: python scripts/crawl_reddit.py
        continue-on-error: true

      - name: Crawl Alpha Vantage sentiment
        env:
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: python scripts/crawl_alphavantage.py
        continue-on-error: true

      - name: Aggregate US
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/aggregate.py

      - name: Translate US to Korean (Claude batch)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/translate_claude.py
        continue-on-error: true

      - name: Translate US to Korean (fallback — DeepL/Google)
        if: ${{ env.HAS_ANTHROPIC != 'true' }}
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          HAS_ANTHROPIC: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: python scripts/translate.py
        continue-on-error: true

      # ----- KR Pipeline -----
      - name: Crawl KR news (RSS)
        run: python scripts/crawl_kr_news.py
        continue-on-error: true

      - name: Crawl DART filings
        env:
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
        run: python scripts/crawl_dart.py
        continue-on-error: true

      - name: Crawl KR quotes
        run: python scripts/crawl_kr_quotes.py
        continue-on-error: true

      - name: Aggregate KR
        run: python scripts/aggregate_kr.py
        continue-on-error: true

      - name: Commit data updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news_feed.json data/market_snapshot.json data/news_feed_kr.json data/market_snapshot_kr.json data/translate_cache.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "no changes"
            exit 0
          fi
          TOP=$(python -c "import json; d=json.load(open('data/news_feed.json')); items=d.get('items',[]); print((items[0].get('title') or '')[:60] if items else 'no items')")
          git commit -m "data: news feed refresh — ${TOP}"
          git push
